<svg width="350" height="500" viewBox="0 0 350 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D"/>
      <stop offset="50%" style="stop-color:#9C27B0"/>
      <stop offset="100%" style="stop-color:#FF6B9D"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4513"/>
      <stop offset="50%" style="stop-color:#A0522D"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="10" stdDeviation="15" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Book shadow/base -->
  <rect x="20" y="10" width="310" height="480" rx="5" fill="#000" opacity="0.1"/>
  
  <!-- Book spine -->
  <rect x="20" y="10" width="40" height="480" rx="3" fill="url(#spineGrad)"/>
  
  <!-- Book cover -->
  <rect x="60" y="10" width="280" height="480" rx="5" fill="url(#coverGrad)" filter="url(#shadow)"/>
  
  <!-- Decorative pattern -->
  <circle cx="200" cy="150" r="80" fill="rgba(255,255,255,0.1)"/>
  <circle cx="280" cy="350" r="60" fill="rgba(255,255,255,0.08)"/>
  <circle cx="120" cy="400" r="40" fill="rgba(255,255,255,0.05)"/>
  
  <!-- Easter eggs decoration -->
  <ellipse cx="150" cy="120" rx="25" ry="35" fill="#FFD700" transform="rotate(-20 150 120)"/>
  <ellipse cx="250" cy="180" rx="20" ry="28" fill="#98FB98" transform="rotate(15 250 180)"/>
  <ellipse cx="100" cy="280" rx="22" ry="30" fill="#87CEEB" transform="rotate(-10 100 280)"/>
  
  <!-- Egg decorations -->
  <rect x="135" y="105" width="30" height="4" fill="#FF6B6B" transform="rotate(-20 150 120)"/>
  <rect x="140" y="115" width="20" height="3" fill="#4ECDC4" transform="rotate(-20 150 120)"/>
  <rect x="240" y="165" width="20" height="3" fill="#FFE66D" transform="rotate(15 250 180)"/>
  
  <!-- Title -->
  <text x="200" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="white">PÁSCOA</text>
  <text x="200" y="285" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="white">LUCRATIVA</text>
  
  <!-- Subtitle -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">O Guia Completo dos</text>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.9)">Ovos de Páscoa</text>
  
  <!-- Badge -->
  <rect x="130" y="380" width="140" height="35" rx="17" fill="#FFD700"/>
  <text x="200" y="403" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">50+ RECEITAS</text>
  
  <!-- PDF badge -->
  <rect x="260" y="440" width="60" height="25" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="290" y="457" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white">PDF</text>
  
  <!-- Bunny icon -->
  <text x="80" y="450" font-size="40">🐰</text>
</svg>
